name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  test:
    name: Check & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Svelte check (type-check)
        run: npm run check

      - name: Run unit tests
        run: npm test
